<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Fundacite</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body id="cuerpo-fondo">

<div class="contenedor">

    <!-- LOGIN -->
    <div id="caja-login" class="login-box">
        <h2>Iniciar Sesión</h2>

        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="user-login" placeholder="Ingrese su usuario">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="pass-login" placeholder="Ingrese su contraseña">
        </div>

        <button class="btn" onclick="window.location.href='dashboard.html'">
        Iniciar Sesión
        </button>

        <p class="cambio-form">
            ¿No tienes cuenta?
            <span onclick="irARegistro()">Regístrate aquí</span>
        </p>
    </div>


    <!-- REGISTRO -->
    <div id="caja-registro" class="login-box" style="display: none;">
        <h2>Registro de Usuario</h2>

        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="user-register" placeholder="Ingrese su usuario">
        </div>

        <div class="input-group">
            <label>Nombre Completo</label>
            <input type="text" placeholder="Ej. Juan Pérez">
        </div>

        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" placeholder="usuario@correo.com">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" placeholder="Crea una contraseña">
        </div>

        <button class="btn">Crear Cuenta</button>

        <p class="cambio-form">
            ¿Ya tienes cuenta?
            <span onclick="irALogin()">Volver al inicio</span>
        </p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>

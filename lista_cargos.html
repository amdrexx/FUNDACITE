<body>

    <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </button>

    <div class="topbar">
        <img src="logo.png" alt="Logo">
    </div>

   
<div class="sidebar" id="sidebar" style="display: flex; flex-direction: column; justify-content: space-between; height: 100vh;">
    
   
    <ul style="list-style: none; padding: 0; margin: 0;">
        <li>
            <a href="dashboard.html" class="submenu-link"><b>INICIO</b></a>
        </li>
        <li>
            <a href="lista_personas.html" class="submenu-link"><b>PERSONAS</b></a>
        </li>
        <li>
            <a href="lista_trabajadores.html" class="submenu-link"><b>TRABAJADORES</b></a>
        </li>
        <li>
            <a href="lista_cargos.html" class="submenu-link"><b>CARGO</b></a>
        </li>
         <li>
            <a href="lista_direcciones.html" class="submenu-link"><b>DIRECCION</b></a>
        </li>
        
         <li>
            <a href="lista_contratos.html" class="submenu-link"><b>CONTRATOS</b></a>
        </li>
        
        <li>
            <a href="lista_usuarios.html" class="submenu-link"><b>USUARIO</b></a>
        </li>

         <li>
            <a href="lista_solicitudes.html" class="submenu-link"><b>SOLICITUDES DE DIAS DE DISFRUTE</b></a>

    <ul style="list-style: none; padding: 0; margin-bottom: 20px;">
        <li>
            <a href="" class="submenu-link"><b>CERRAR SESIÓN</b></a>
        </li>
    </ul>

</div>

    <div class="overlay"></div>

    <div class="main">
        <div class="glass tabla-container">
            <h2 style="text-align:center; color:white;">Lista de Cargos</h2>

       
            <div class="buscador-container">
                <input 
                    type="text" 
                    class="input-busqueda"
                    placeholder="Buscar cargo..."
                >
                <button class="btn-buscar">Buscar</button>
                <a href="registrar_cargo.html" class="btn-persona" style="text-decoration:none;">
                    + Agregar Cargo
                </a>
            </div>

         
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Nombre del Cargo</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                 
                    <tr>
                        <td>Analista de Sistemas</td>
                        <td class="acciones">
                            <button class="btn-editar" onclick="editarCargo('Analista de Sistemas')">Editar</button>
                            <button class="btn-eliminar" onclick="eliminarCargo('Analista de Sistemas')">Eliminar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Director de Operaciones</td>
                        <td class="acciones">
                            <button class="btn-editar" onclick="editarCargo('Director de Operaciones')">Editar</button>
                            <button class="btn-eliminar" onclick="eliminarCargo('Director de Operaciones')">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="boton_desplegable.js"></script>
    <script src="valid_cargo.js"></script>
</body>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Personas</title>
    <link rel="stylesheet" href="style_dashboard.css">
</head>

<body>

   <div class="topbar">
    <img src="logo.png" alt="Logo">
</div>
    <!-- BOTÓN -->
<button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <ul>
        <!-- ITEM CON SUBMENÚ -->
        <li class="submenu">
            <div class="submenu-btn" onclick="toggleSubmenu(this)">
                <span><b>PERSONAS</b></span>
                <span class="arrow">▼</span>
            </div>
        <ul class="submenu-content">
        <li>
            <a href="registro_personas.html" class="submenu-link">
            <img src="nueva_persona.png" class="icon-submenu">
            Registrar Persona
        </a>
    </li>

        <li>
        <a href="lista_personas.html" class="submenu-link">
        <img src="icono_lista.png" class="icon-submenu">
        Lista de Personas
        </a>
        </li>
            </ul>

        <li><b>BENEFICIARIOS</b></li>
    </ul>
</div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- CONTENIDO -->
    <div class="main">

        <!-- FORMULARIO -->
        <form class="form-card">

            <center><h2>Registro de Personas</h2></center>

            <div class="field">
                <label>Tipo de Documento</label>
                <select>
                    <option value="">Seleccione...</option>
                    <option>V</option>
                    <option>E</option>
                    <option>J</option>
                </select>
            </div>

            <div class="field">
                <label>Cédula</label>
                <input type="text" placeholder="Ingrese cédula">
            </div>

            <div class="field">
                <label>Nombres</label>
                <input type="text" placeholder="Ingrese nombres">
            </div>

            <div class="field">
                <label>Apellidos</label>
                <input type="text" placeholder="Ingrese apellidos">
            </div>

            <div class="field">
                <label>Parentesco</label>
                <select>
                    <option value="">Seleccione...</option>
                    <option>Titular</option>
                    <option>Hijo/a</option>
                    <option>Esposo/a</option>
                    <option>Otro</option>
                </select>
            </div>

            <div class="field">
                <label>Fecha de Nacimiento</label>
                <input type="date">
            </div>

            <button type="submit" class="btn-guardar">Guardar</button>

        </form>

    </div>
    <script src="boton_desplegable.js"></script>

</body>
</html>

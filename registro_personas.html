<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Personas</title>
    <link rel="stylesheet" href="style_dashboard.css">
    <style>
        /* ================= ALERTA PERSONALIZADA ================= */
        .custom-alert {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .alert-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
            animation: pop 0.2s ease-in-out;
        }

        .alert-box p {
            white-space: pre-line;
            font-size: 15px;
            margin-bottom: 15px;
        }

        .alert-box button {
            background: #1e88e5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        @keyframes pop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<!-- ================= ALERTA ================= -->
<div id="customAlert" class="custom-alert hidden">
    <div class="alert-box">
        <p id="alertMessage"></p>
        <button onclick="closeAlert()">Aceptar</button>
    </div>
</div>

<!-- ================= CONTENIDO ================= -->
<div class="main">
    <form class="form-card" id="formPersonas">
        <center><h2>Registro de Personas</h2></center>

        <div class="field">
            <label>Tipo de Documento</label>
            <select id="tipoDoc">
                <option value="">Seleccione...</option>
                <option>V</option>
                <option>E</option>
            </select>
        </div>

        <div class="field">
            <label>Cédula</label>
            <input type="text" id="cedula" maxlength="8" placeholder="Ingrese cédula">
        </div>

        <div class="field">
            <label>Número de Teléfono</label>
            <input type="text" id="numeroTelefono" maxlength="11" placeholder="Ingrese Número de Teléfono">
        </div>

        <div class="field">
            <label>Nombres</label>
            <input type="text" id="nombres" placeholder="Ingrese nombres">
        </div>

        <div class="field">
            <label>Apellidos</label>
            <input type="text" id="apellidos" placeholder="Ingrese apellidos">
        </div>

        <div class="field">
            <label>Género</label>
            <select id="genero">
                <option value="">Seleccione...</option>
                <option>Masculino</option>
                <option>Femenino</option>
            </select>
        </div>

        <div class="field">
            <label>Estado Civil</label>
            <select id="estadoCivil">
                <option value="">Seleccione...</option>
                <option>Soltero(a)</option>
                <option>Casado(a)</option>
                <option>Divorciado(a)</option>
                <option>Viudo(a)</option>
            </select>
        </div>

        <div class="field">
            <label>Correo Electrónico</label>
            <input type="text" id="correoElectronico" placeholder="Ingrese correo electrónico">
        </div>

        <div class="field">
            <label>Fecha de Nacimiento</label>
            <input type="date" id="fecha">
        </div>

        <div class="field">
            <label>Edad</label>
            <input type="text" id="edad" placeholder="Se calculará automáticamente" readonly>
        </div>

        <button type="submit" class="btn-guardar">Registrar</button>
    </form>
</div>

<script src="boton_desplegable.js"></script>
<script src="valid_personas.js"></script>

</body>

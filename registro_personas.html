<div class="overlay"></div>

<div class="main">
    <form class="form-card" id="formPersonas">
        <center><h2>Registro de Personas</h2></center>

        <div class="field">
            <label>Tipo de Documento</label>
            <select id="tipoDoc">
                <option value="">Seleccione...</option>
                <option>V</option>
                <option>E</option>
            </select>
        </div>

        <div class="field">
            <label>Cédula</label>
            <input type="text" id="cedula" maxlength="8" placeholder="Ingrese cédula">
        </div>

        <div class="field">
            <label>Número de Teléfono</label>
            <input type="text" id="numeroTelefono" maxlength="11" placeholder="Ingrese Número de Teléfono">
        </div>

        <div class="field">
            <label>Nombres</label>
            <input type="text" id="nombres" placeholder="Ingrese nombres">
        </div>

        <div class="field">
            <label>Apellidos</label>
            <input type="text" id="apellidos" placeholder="Ingrese apellidos">
        </div>

        <div class="field">
            <label>Género</label>
            <select id="genero">
                <option value="">Seleccione...</option>
                <option>Masculino</option>
                <option>Femenino</option>
            </select>
        </div>

        <div class="field">
            <label>Estado Civil</label>
            <select id="estadoCivil">
                <option value="">Seleccione...</option>
                <option>Soltero(a)</option>
                <option>Casado(a)</option>
                <option>Divorciado(a)</option>
                <option>Viudo(a)</option>
            </select>
        </div>

        <div class="field">
            <label>Correo Electrónico</label>
            <input type="text" id="correoElectronico" placeholder="Ingrese correo electrónico">
        </div>

        <div class="field">
            <label>Fecha de Nacimiento</label>
            <input type="date" id="fecha">
        </div>

        <div class="field">
            <label>Edad</label>
            <input type="text" id="edad" placeholder="Se calculará automáticamente" readonly>
        </div>

        <button type="submit" class="btn-guardar">Registrar</button>
    </form>
</div>

<script src="boton_desplegable.js"></script>
<script src="valid_personas.js"></script>

</body>
</html>

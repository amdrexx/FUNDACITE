</div>

<div class="main">
    <form class="form-card" id="formPersonas">
        <div class="form-grid">
            <h2 style="text-align: center; margin-bottom: 10px;">Registro de Trabajador</h2>

            <div class="field">
                <label>Tipo de Documento</label>
                <select id="tipoDoc">
                    <option value="">Seleccione...</option>
                    <option>V</option>
                    <option>E</option>
                </select>
            </div>
            
            <div class="field">
                <label>Edad</label>
                <input type="text" id="edad" placeholder="Se calculará automáticamente" readonly>
            </div>
            
            
            <div class="field">
                <label>Cédula</label>
                <input type="text" id="cedula" maxlength="8" placeholder="Ingrese cédula">
            </div>

             <div class="field">
                <label>Estado Civil</label>
                <select id="estadoCivil">
                    <option value="">Seleccione...</option>
                    <option>Soltero(a)</option>
                    <option>Casado(a)</option>
                    <option>Divorciado(a)</option>
                    <option>Viudo(a)</option>
                </select>
            </div>

              
            <div class="field">
                <label>Nombres</label>
                <input type="text" id="nombres" maxlength="50" placeholder="Ingrese nombres">
            </div>

           <div class="field">
                <label>Género</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="genero" value="Masculino">
                        <span>Masculino</span>
                    </label>

                    <label class="radio-option">
                        <input type="radio" name="genero" value="Femenino">
                        <span>Femenino</span>
                    </label>
                </div>
            </div>
            <div class="field">
                <label>Apellidos</label>
                <input type="text" id="apellidos" maxlength="50" placeholder="Ingrese apellidos">
            </div>

            <div class="field">
                <label>Correo Electrónico</label>
                <input type="text" id="correoElectronico" maxlength="100" placeholder="Ingrese correo electrónico">
            </div>

            <div class="field">
                <label>Fecha de Nacimiento</label>
                <input type="date" id="fecha">
            </div>
            
            <div class="field">
                <label>Número de Teléfono</label>
                <input type="text" id="numeroTelefono" maxlength="11" placeholder="Ingrese Número de Teléfono">
            </div>
             <div class="field">
                <label>Fecha de Ingreso</label>
                <input type="date" name="fecha_ingreso" id="fecha_ingreso">
            </div>

            <div class="field">
                <label>Cargo</label>
                <select name="cargo_id" >
                    <option value="">Seleccione un cargo</option>
                    <option>Administrador</option>
                    <option>Analista</option>
                    <option>Técnico</option>
                </select>
            </div>
          
            <div class="field">
                <label>Tipo de Contratación</label>
                <select name="tipo_contrato">
                    <option value="">Seleccione</option>
                    <option>Fijo</option>
                    <option>Contratado</option>
                    <option>Por Honorarios</option>
                </select>
            </div>

           
            <div class="field">
                <label>Estatus Laboral</label>
                <select name="estatus_laboral">
                    <option value="">Seleccione</option>
                    <option>Activo</option>
                    <option>Jubilado</option>
                    <option>Suspendido</option>
                    <option>Retirado</option>
                </select>
            </div>

            

            <button type="submit" class="btn-guardar full-width">Registrar</button>
        </div>
    </form>
</div>

<script src="boton_desplegable.js"></script>
<script src="valid_personas.js"></script>
<script src="valid_trabajadores.js"></script>



</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style_dashboard.css">

</head>

<body>

<div class="topbar">
    <img src="tu-imagen.png" alt="Logo">
</div>
    <!-- BOTÓN -->
<button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <ul>
        <!-- ITEM CON SUBMENÚ -->
        <li class="submenu">
            <div class="submenu-btn" onclick="toggleSubmenu(this)">
                <span><b>PERSONAS</b></span>
                <span class="arrow">▼</span>
            </div>
        <ul class="submenu-content">
        <li>
            <a href="registro_personas.html" class="submenu-link">
            <img src="nueva_persona.png" class="icon-submenu">
            Registrar Persona
        </a>
    </li>

        <li>
        <a href="lista_personas.html" class="submenu-link"></a>
        <img src="icono_lista.png" class="icon-submenu">
        Lista de Personas
        </li>
            </ul>

        <li><b>BENEFICIARIOS</b></li>
    </ul>
</div>
<div class="overlay"></div>

<!-- MAIN -->
<div class="main">

    <div class="glass">

        <div class="cards">

            <!-- ACTIVO -->
            <div class="card">
                <div class="icon">
                    <img src="persona_activa.png" alt="icono">
                </div>
                <h3><b>PERSONAL ACTIVO</b></h3>
                <div class="status green"></div>
                <div class="number">120</div>
            </div>

            <!-- JUBILADO -->
            <div class="card">
                <div class="icon">
                    <img src="persona_inactiva.png" alt="icono">
                </div>
                <h3><b>PERSONAL JUBILADO</b></h3>
                <div class="status gray"></div>
                <div class="number">45</div>
            </div>

        </div>

    </div>

</div>

<script src="boton_desplegable.js"></script>


</body>
</html>

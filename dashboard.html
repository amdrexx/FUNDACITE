<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style_dashboard.css">
</head>

<body>

<!-- ================= TOPBAR ================= -->
<div class="topbar">
    <img src="logo.png" alt="Logo">
</div>

<!-- ================= BOTÓN MENÚ ================= -->
<button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
</button>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar" id="sidebar" style="display: flex; flex-direction: column; justify-content: space-between; height: 100vh;">
    
    <!-- Parte superior del menú -->
    <ul style="list-style: none; padding: 0; margin: 0;">
        <li>
            <a href="dashboard.html" class="submenu-link"><b>INICIO</b></a>
        </li>
        <li>
            <a href="lista_personas.html" class="submenu-link"><b>PERSONAS</b></a>
        </li>
        <li>
            <a href="lista_trabajadores.html" class="submenu-link"><b>TRABAJADORES</b></a>
        </li>
        <li>
            <a href="cargos.html" class="submenu-link"><b>CARGO</b></a>
        </li>
        <li>
            <a href="usuarios.html" class="submenu-link"><b>USUARIO</b></a>
        </li>
    </ul>

    <!-- Parte inferior del menú (Cerrar Sesión) -->
    <ul style="list-style: none; padding: 0; margin-bottom: 20px;">
        <li>
            <a href="" class="submenu-link"><b>CERRAR SESIÓN</b></a>
        </li>
    </ul>

</div>

<div class="overlay"></div>

<!-- ================= MAIN ================= -->
<div class="main">

    <div class="dashboard-container">


        <div class="cards">

            <div class="card">
                <div class="icon">
                    <img src="persona_activa.png" alt="icono">
                </div>
                <h3>PERSONAL ACTIVO</h3>
                <div class="status green"></div>
                <div class="number">56</div>
            </div>

            <div class="card">
                <div class="icon">
                    <img src="persona_jubilada.png" alt="icono">
                </div>
                <h3>PERSONAL JUBILADO</h3>
                <div class="status gray"></div>
                <div class="number">5</div>
            </div>

            <div class="card">
                <div class="icon">
                    <img src="persona_inactiva.png" alt="icono">
                </div>
                <h3>PERSONAL INACTIVO</h3>
                <div class="status red"></div>
                <div class="number">16</div>
            </div>
        </div>

        <!-- ===== SECCIÓN GRÁFICO ===== -->
        <div class="chart-section">

            <h2>Distribución del Personal</h2>

            <div class="chart-container">
                <canvas id="personalChart"></canvas>
            </div>

        </div>

    </div>

</div>

<!-- ================= CHART.JS ================= -->
<script src="chart.js"></script>

<script>
const ctx = document.getElementById('personalChart');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Activo', 'Jubilado', 'Inactivo'],
        datasets: [{
            data: [56, 5, 16],
            backgroundColor: ['#4CAF50', '#b4b4b4', '#ff6b6b'],
            borderWidth: 0,
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                position: 'bottom',
                 labels: {
                color: '#000000'
            }
            }
        },
        cutout: '65%'
    }
});
</script>   
<!-- JS -->
<script src="boton_desplegable.js"></script>

</body>
</html>

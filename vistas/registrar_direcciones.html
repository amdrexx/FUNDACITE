    <div class="main">
        <div class="form-card">
            <center><h2>Registro de Dirección</h2></center>

            <!-- Estado -->
            <div class="field">
                <label>Estado</label>
                <input type="text" id="estado" placeholder="Ingrese el estado">
            </div>

            <!-- Municipio -->
            <div class="field">
                <label>Municipio</label>
                <input type="text" id="municipio" placeholder="Ingrese el municipio">
            </div>

            <!-- Parroquia -->
            <div class="field">
                <label>Parroquia</label>
                <input type="text" id="parroquia" placeholder="Ingrese la parroquia">
            </div>

            <!-- Sector -->
            <div class="field">
                <label>Sector</label>
                <input type="text" id="sector" placeholder="Ingrese el sector">
            </div>

            <!-- Botón Guardar -->
            <button type="button" class="btn-guardar" id="btnGuardar">Guardar Dirección</button>
        </div>
    </div>

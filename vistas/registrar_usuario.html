    <div class="overlay"></div>

 
    <div class="main">
        <form class="form-card" id="formUsuarios">
            <center><h2>Registro de Usuarios</h2></center>
             
            <div class="field">
                <label>Trabajador Asociado</label>
                <select id="trabajadorAsociado">
                    <option value="">Seleccione...</option>
                    <!-- Las opciones se llenarán desde la base de datos -->
                    <option value="1">12345678 - Juan Pérez</option>
                    <option value="2">87654321 - María Gómez</option>
                </select>
            </div>
            
            <div class="field">
                <label>Usuario</label>
                <input type="text" id="usuario" placeholder="Ingrese nombre de usuario">
            </div>

            <div class="field">
                <label>Contraseña</label>
                <input type="password" id="contrasena" placeholder="Ingrese contraseña">
            </div>

            <div class="field">
                <label>Tipo de Usuario</label>
                <select id="tipoUsuario">
                    <option value="">Seleccione...</option>
                    <option value="Analista">Analista</option>
                    <option value="Director">Director</option>
                    <option value="Administrador">Administrador</option>
                </select>
            </div>

            <button type="submit" class="btn-guardar">Registrar</button>
        </form>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script src="boton_desplegable.js"></script>
    <script src="valid_usuarios.js"></script>

<div class="main">
    <div class="form-card">
        <center><h2>Registro de Parroquia</h2></center>

        <!-- Select de Estados -->
        <div class="field">
            <label>Seleccione el Estado</label>
            <select id="selectEstado">
                <option value="">Seleccione un estado</option>
            </select>
        </div>

        <!-- Select de Municipio -->
        <div class="field">
            <label>Seleccione el Municipio</label>
            <select id="selectMunicipio">
                <option value="">Seleccione un municipio</option>
            </select>
        </div>

        <!-- CONTENEDOR DE PARROQUIAS -->
        <div id="contenedorParroquias">

            <!-- Parroquia -->
            <div class="field">
                <label>Nombre de la parroquia</label>
                <input type="text" name="parroquia[]" placeholder="Ingrese la parroquia">
            </div>

        </div>

        <!-- Botón Añadir parroquia -->
        <button type="button" class="btn-accion" id="btnAgregar">
            Añadir parroquia
        </button>

        <!-- Botón Guardar -->
        <button type="button" class="btn-guardar">
            Guardar
        </button>
    </div>

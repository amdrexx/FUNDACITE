</div>

    <div class="overlay"></div>

    <!-- ================= CONTENIDO ================= -->
    <div class="main">
        <div class="glass tabla-container">
            <h2 style="text-align:center; color:white;">Lista de Usuarios</h2>

            <!-- Barra de búsqueda -->
            <div class="buscador-container">
                <input 
                    type="text" 
                    class="input-busqueda"
                    placeholder="Buscar por usuario o tipo..."
                >
                <button class="btn-buscar">Buscar</button>
                <a href="registrar_usuario.html" class="btn-persona" style="text-decoration:none;">
                    + Agregar Usuario
                </a>
            </div>

            <!-- ================= TABLA DE USUARIOS ================= -->
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Nombre de Usuario</th>
                        <th>Tipo de Usuario</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Fila de ejemplo -->
                    <tr>
                        <td>admin_sistema</td>
                        <td>Administrador</td>
                        <td class="acciones">
                            <button class="btn-editar" onclick="editarUsuario('admin_sistema')">Editar</button>
                            <button class="btn-eliminar" onclick="eliminarUsuario('admin_sistema')">Eliminar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>analista_01</td>
                        <td>Analista</td>
                        <td class="acciones">
                            <button class="btn-editar" onclick="editarUsuario('analista_01')">Editar</button>
                            <button class="btn-eliminar" onclick="eliminarUsuario('analista_01')">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="boton_desplegable.js"></script>
    <script src="valid_usuarios.js"></script>

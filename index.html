<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Fundacite</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body id="cuerpo-fondo">

<div class="contenedor">

    <!-- LOGIN -->
    <div id="caja-login" class="login-box">
        <h2>Iniciar Sesión</h2>

        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="user-login" placeholder="Ingrese su usuario">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="pass-login" placeholder="Ingrese su contraseña">
        </div>

        <button class="btn" onclick="window.location.href='dashboard.html'">
        Iniciar Sesión
        </button>

    </div>

</body>
</html>

            <ul class="submenu-content">

                    <a href="registro_personas.html" class="submenu-link">
                        <img src="nueva_persona.png" class="icon-submenu">

                    </a>
                </li>

                <li>
                    <a href="lista_personas.html" class="submenu-link">
                        <img src="icono_lista.png" class="icon-submenu">

                    </a>

<div class="overlay"></div>


    <!-- ================= CONTENIDO ================= -->

    <div class="glass tabla-container">

       
<h2 style="text-align:center; color:white;">Lista de Personas</h2>

        <!-- ================= BARRA DE BÚSQUEDA ================= -->
        <div class="buscador-container">

            <input 
                type="text" 
                class="input-busqueda"
                placeholder="Buscar por cédula, nombre o apellido..."
            >

            <button class="btn-buscar">
                Buscar
            </button>

        </div>

        <!-- ================= TABLA ================= -->
        <table class="tabla">

            <thead>
                <tr>

                    <th>Tipo Doc</th>
                    <th>Cédula</th>
                    <th>Teléfono</th>
                    <th>Nombres</th>
                    <th>Apellidos</th>
                    <th>Género</th>
                    <th>Estado Civil</th>
                    <th>Correo Electrónico</th>
                    <th>Fecha de Nacimiento</th>

                </tr>
            </thead>

            <tbody>

                <!-- DATOS DE PERSONAS -->
                <tr>

                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>

                </tr>

            </tbody>

        </table>

<div class="overlay"></div>

<div class="main">

    <div class="form-card">

        <center><h2>Registro Trabajador</h2></center>

        <!-- PERSONA (BUSCADOR POR CÉDULA) -->
        <div class="field">
            <label>Buscar Persona (Cédula)</label>

            <select id="persona_id" name="persona_id" style="width:100%" required>
                <option value="">Seleccione una persona</option>

                <!-- EJEMPLOS (luego viene de BD) -->
                <option value="1">12345678 - Juan Pérez</option>
                <option value="2">87654321 - María Gómez</option>
                <option value="3">11223344 - Carlos López</option>
            </select>
        </div>

        <!-- CARGO -->
        <div class="field">
            <label>Cargo</label>
            <select name="cargo_id" required>
                <option value="">Seleccione un cargo</option>
                <option>Administrador</option>
                <option>Analista</option>
                <option>Técnico</option>
            </select>
        </div>

        <!-- FECHA INGRESO -->
        <div class="field">
            <label>Fecha de Ingreso</label>
            <input type="date" name="fecha_ingreso" required>
        </div>

        <!-- TIPO CONTRATO -->
        <div class="field">
            <label>Tipo de Contratación</label>
            <select name="tipo_contrato" required>
                <option value="">Seleccione</option>
                <option>Fijo</option>
                <option>Contratado</option>
                <option>Por Honorarios</option>
            </select>
        </div>

        <!-- ESTATUS LABORAL -->
        <div class="field">
            <label>Estatus Laboral</label>
            <select name="estatus_laboral" required>
                <option value="">Seleccione</option>
                <option>Activo</option>
                <option>Jubilado</option>
                <option>Suspendido</option>
                <option>Retirado</option>
            </select>
        </div>

        <!-- BOTÓN -->
        <button class="btn-guardar">Registrar Trabajador</button>

    </div>

</div>

<!-- ================= JS ================= -->

<!-- JQUERY (OBLIGATORIO) -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>

<!-- SELECT2 JS (CORRECTO) -->
<script src="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/js/select2.min.js"></script>

    <script src="boton_desplegable.js"></script>

<!-- ACTIVAR SELECT2 -->
<script>
$(document).ready(function() {
    $('#persona_id').select2({
        placeholder: "Escriba la cédula o nombre...",
        allowClear: true,
        width: '100%'
    });
});
</script>
<script
<script>
// Esperar a que todo cargue (incluye jQuery y Select2)
document.addEventListener("DOMContentLoaded", function() {

    // Capturamos el botón (NO necesitas form)
    const btn = document.querySelector(".btn-guardar");

    btn.addEventListener("click", function(e) {
        e.preventDefault();

        let persona = document.getElementById("persona_id").value;
        let cargo = document.querySelector("select[name='cargo_id']").value;
        let fecha = document.querySelector("input[name='fecha_ingreso']").value;
        let contrato = document.querySelector("select[name='tipo_contrato']").value;
        let estatus = document.querySelector("select[name='estatus_laboral']").value;

        let errores = [];

        if (!persona) errores.push("Persona (Cédula)");
        if (!cargo) errores.push("Cargo");
        if (!fecha) errores.push("Fecha de Ingreso");
        if (!contrato) errores.push("Tipo de Contratación");
        if (!estatus) errores.push("Estatus Laboral");

        if (errores.length > 0) {
            showAlert(
                "Debes completar los siguientes campos:\n\n• " + errores.join("\n• "),
                false
            );
            return;
        }

        // ✅ ÉXITO
        showAlert("Trabajador registrado correctamente", true);

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);
    });

});

// ALERTA (si ya la tienes, no dupliques)
function showAlert(message, success = false) {
    document.getElementById("customAlert").classList.remove("hidden");
    document.getElementById("alertMessage").innerText = message;

    let btn = document.querySelector(".alert-box button");
    btn.style.background = success ? "#2e7d32" : "#c62828";
}

function closeAlert() {
    document.getElementById("customAlert").classList.add("hidden");
}
</script>
</body>
</html>

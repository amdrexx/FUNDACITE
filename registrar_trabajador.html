    <div class="main">
        <form class="form-card" id="formTrabajadores">
            <div class="form-grid">
            <h2 style="text-align: center; margin-bottom: 10px;">Registro de Trabajador</h2>

           
            <div class="field">
                <label>Buscar Persona (Cédula)</label>
                <select id="persona_id" name="persona_id" style="width:100%" required>
                    <option value="">Seleccione una persona</option>
                    <option value="1">12345678 - Juan Pérez</option>
                    <option value="2">87654321 - María Gómez</option>
                    <option value="3">11223344 - Carlos López</option>
                </select>
            </div>

           
            <div class="field">
                <label>Fecha de Ingreso</label>
                <input type="date" name="fecha_ingreso" id="fecha_ingreso" required>
            </div>

            <div class="field">
                <label>Cargo</label>
                <select name="cargo_id" required>
                    <option value="">Seleccione un cargo</option>
                    <option>Administrador</option>
                    <option>Analista</option>
                    <option>Técnico</option>
                </select>
            </div>
          
            <div class="field">
                <label>Tipo de Contratación</label>
                <select name="tipo_contrato" required>
                    <option value="">Seleccione</option>
                    <option>Fijo</option>
                    <option>Contratado</option>
                    <option>Por Honorarios</option>
                </select>
            </div>

           
            <div class="field">
                <label>Estatus Laboral</label>
                <select name="estatus_laboral" required>
                    <option value="">Seleccione</option>
                    <option>Activo</option>
                    <option>Jubilado</option>
                    <option>Suspendido</option>
                    <option>Retirado</option>
                </select>
            </div>

       
            <button type="submit" class="btn-guardar full-width">Registrar</button>
            </div>
        </form>
    </div>

    <script src="jquery.min.js"></script>

    <script src="select2.min.js"></script>


    <script src="boton_desplegable.js"></script>
    <script src="valid_trabajadores.js"></script>

    
</body>
